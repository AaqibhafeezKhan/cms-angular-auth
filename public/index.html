<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CMS Ultra Auth — Angular-powered authentication and role management for the CMS microfrontend platform">
  <title>Auth &amp; Roles — CMS Ultra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/zone.js@0.11.3/dist/zone.min.js"></script>
  <script type="systemjs-importmap">
    {
      "imports": {
        "single-spa": "https://cdn.jsdelivr.net/npm/single-spa@5.9.3/lib/system/single-spa.min.js"
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/systemjs@6.8.3/dist/system.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/systemjs@6.8.3/dist/extras/amd.min.js"></script>

  <style>
    :root {
      --primary: #4f46e5; --secondary: #7c3aed; --accent: #4f46e5;
      --bg-dark: #f8fafc; --bg-darker: #f1f5f9; --card-bg: #ffffff;
      --text-main: #0f172a; --text-muted: #64748b;
      --glass: rgba(255,255,255,1); --border: #e2e8f0;
      --primary-gradient: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg-darker); color: var(--text-main); min-height: 100vh; padding: 2rem; }
    #app-root { max-width: 960px; margin: 0 auto; }
    .standalone-badge { display: inline-flex; align-items: center; gap: 0.5rem; background: rgba(79,70,229,0.1); border: 1px solid rgba(79,70,229,0.2); color: #4f46e5; padding: 0.4rem 1rem; border-radius: 999px; font-size: 0.75rem; font-weight: 600; margin-bottom: 2rem; letter-spacing: 0.05em; }
    .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 1rem; padding: 1.5rem; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
    .vibrant-text { background: var(--primary-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-in { animation: fadeIn 0.5s ease forwards; }
  </style>
</head>
<body>
  <div id="app-root">
    <div class="standalone-badge">🔴 Standalone Preview · Angular Microfrontend</div>
    <div id="single-spa-container">
      <app-root></app-root>
    </div>
  </div>
  <script>
    System.import('./main.js').then(({ bootstrap, mount }) => {
      const props = { name: 'cms-angular-auth', domElement: document.getElementById('single-spa-container') };
      bootstrap(props).then(() => mount(props));
    }).catch(err => {
      console.error('Angular MFE failed:', err);
      document.getElementById('single-spa-container').innerHTML =
        '<div style="color:#f87171;padding:2rem;border:1px solid rgba(248,113,113,0.3);border-radius:1rem;margin-top:1rem"><h3>⚠ Failed to load Auth MFE</h3><p style="margin-top:0.5rem;font-size:0.875rem;opacity:0.7">' + err.message + '</p></div>';
    });
  </script>
</body>
</html>
