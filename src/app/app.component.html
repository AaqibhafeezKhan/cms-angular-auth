<div class="animate-in" style="display: flex; align-items: center; justify-content: center; min-height: 80vh;">
  <div class="card" style="width: 100%; max-width: 450px; padding: 3rem;">
    <div style="text-align: center; margin-bottom: 2.5rem;">
      <div style="width: 64px; height: 64px; background: var(--primary); border-radius: 1rem; margin: 0 auto 1.5rem; display: flex; align-items: center; justify-content: center; font-size: 2rem; box-shadow: 0 0 20px var(--primary);">
        🔐
      </div>
      <h2 style="font-size: 1.75rem; margin-bottom: 0.5rem;">Secure Access</h2>
      <p style="color: var(--text-muted);">Enter your credentials to manage MFE roles</p>
    </div>

    <form style="display: flex; flex-direction: column; gap: 1.5rem;">
      <div>
        <label style="display: block; margin-bottom: 0.5rem; font-size: 0.875rem; font-weight: 500;">Email Address</label>
        <input 
          type="email" 
          placeholder="admin@cms-ultra.com"
          style="width: 100%; padding: 0.875rem; background: var(--bg-darker); border: 1px solid var(--border); border-radius: 0.5rem; color: var(--text-main); font-size: 1rem;"
        >
      </div>

      <div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
          <label style="font-size: 0.875rem; font-weight: 500;">Password</label>
          <a href="#" style="color: var(--accent); font-size: 0.75rem; text-decoration: none;">Forgot?</a>
        </div>
        <input 
          type="password" 
          placeholder="••••••••"
          style="width: 100%; padding: 0.875rem; background: var(--bg-darker); border: 1px solid var(--border); border-radius: 0.5rem; color: var(--text-main); font-size: 1rem;"
        >
      </div>

      <div style="display: flex; align-items: center; gap: 0.5rem;">
        <input type="checkbox" id="remember" style="accent-color: var(--primary);">
        <label for="remember" style="font-size: 0.875rem; color: var(--text-muted);">Remember this device</label>
      </div>

      <button type="submit" class="glass-btn active" style="padding: 1rem; font-size: 1rem; justify-content: center; margin-top: 1rem;">
        Sign In to Dashboard
      </button>
    </form>

    <div style="margin-top: 2rem; text-align: center; font-size: 0.875rem; color: var(--text-muted);">
      Don't have an account? <a href="#" style="color: var(--accent); text-decoration: none;">Request access</a>
    </div>
  </div>
</div>
